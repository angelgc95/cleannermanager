name: Run iCal Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger iCal sync
        env:
          SUPABASE_URL: https://qevpbbaxelsckmlcnvrb.supabase.co
          SUPABASE_CRON_SECRET: ${{ secrets.SUPABASE_CRON_SECRET }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            "${SUPABASE_URL}/functions/v1/sync-ics" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${SUPABASE_CRON_SECRET}" \
            -d '{}'
